function getBandForTurn(turn) {
    const bands = ['hermes', 'apollo', 'hephaestus', 'demeter', 'poseidon', 'athena', 'zeus'];
    return bands[turn - 1] || 'zeus';
}

function getBandInfo(band) {
    return DIVINE_BANDS[band];
}

function getFrequencyForBand(band) {
    const ranges = {
        hermes: [4, 8], apollo: [8, 12], hephaestus: [12, 15],
        demeter: [15, 20], poseidon: [20, 30], athena: [30, 40], zeus: [40, 100]
    };
    const range = ranges[band];
    if (!range) return 10;
    return (range[0] + range[1]) / 2;
}

function printLine(text, band = null, isThunder = false) {
    const output = document.getElementById('output');
    const line = document.createElement('div');
    line.textContent = text;
    if (band && DIVINE_BANDS[band]) {
        line.classList.add(`band-${band}`);
    }
    if (isThunder) {
        line.classList.add('thunder');
    }
    output.appendChild(line);
    output.scrollTop = output.scrollHeight;
}

function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

function expandToTarget(text, targetBand) {
    const config = DIVINE_BANDS[targetBand];
    let words = text.split(/\s+/);
    let currentCount = words.length;
    const targetMin = config.targetWords - 10;
    
    if (currentCount >= targetMin) return text;
    
    const needed = targetMin - currentCount;
    const fillerPool = config.filler;
    let expanded = text;
    
    for (let i = 0; i < needed && i < 50; i++) {
        const filler = fillerPool[Math.floor(Math.random() * fillerPool.length)];
        expanded += ' ' + filler;
    }
    
    return expanded;
}

async function synthesizeTurn(band, previousBody, turn, isDescending = false) {
    const bandInfo = DIVINE_BANDS[band];
    let body = '';
    
    if (turn === 1 && !previousBody) {
        // Hermes: gather atomic concepts
        const primitives = ['threshold', 'message', 'wing', 'swift', 'crossing'];
        const shuffled = primitives.sort(() => 0.5 - Math.random());
        body = shuffled.slice(0, 3).join(' · ');
    } else if (previousBody) {
        body = expandToTarget(previousBody, band);
    } else {
        body = `${bandInfo.filler[0]} · ${bandInfo.filler[1]} · ${bandInfo.filler[2]}`;
    }
    
    const wordCount = body.split(/\s+/).length;
    const frequency = getFrequencyForBand(band);
    
    // Store in database
    const direction = isDescending ? 'descend' : 'ascend';
    const label = `${band}_wave_${turn}_${Date.now()}`;
    
    const { error } = await db.from('terminal_entries').insert({
        label: label,
        body: body,
        word_count: wordCount,
        divine_band: band,
        frequency_hz: frequency,
        light_wavelength: bandInfo.light.toLowerCase().replace(' ', '_'),
        divine_icon: bandInfo.icon
    });
    
    if (error) console.error('Insert error:', error);
    
    // Display
    const directionIcon = isDescending ? '▼' : '▲';
    const preview = body.substring(0, 70) + (body.length > 70 ? '...' : '');
    printLine(`   ${directionIcon} ${bandInfo.icon} ${bandInfo.name}: ${wordCount} words, ${frequency.toFixed(1)}Hz`, band);
    printLine(`     "${preview}"`, band);
    
    return body;
}

// ===============================
// PULSE COMMAND
// ===============================
async function runPulse(upTurns, downTurns, repeats) {
    if (isPulsing) {
        printLine('⚠️ Pulse already in progress. Wait for completion.');
        return;
    }
    
    isPulsing = true;
    const input = document.getElementById('command');
    const pulseStatus = document.getElementById('pulseStatus');
    
    input.disabled = true;
    pulseStatus.innerHTML = '● pulsing...';
    
    upTurns = Math.min(upTurns, 7);
    downTurns = Math.min(downTurns, 7);
    
    printLine(`\n🏛️ DIVINE WAVE — Up: ${upTurns}, Down: ${downTurns}, Repeats: ${repeats}\n`);
    
    let allEntries = [];
    let finalBand = '';
    
    for (let wave = 0; wave < repeats; wave++) {
        if (wave > 0) {
            printLine(`\n🌊 WAVE ${wave + 1} of ${repeats}\n`);
            await sleep(800);
        }
        
        let currentBody = '';
        
        // ASCENT
        for (let turn = 1; turn <= upTurns; turn++) {
            const band = getBandForTurn(turn);
            currentBody = await synthesizeTurn(band, currentBody, turn, false);
            allEntries.push({ band, body: currentBody, turn, direction: 'up' });
            finalBand = band;
            
            if (turn < upTurns) {
                await sleep(1618);
            }
        }
        
        // DESCENT
        if (downTurns > 0) {
            await sleep(800);
            for (let step = 1; step <= downTurns; step++) {
                const turn = upTurns - step;
                if (turn < 1) break;
                const band = getBandForTurn(turn);
                currentBody = await synthesizeTurn(band, currentBody, turn, true);
                allEntries.push({ band, body: currentBody, turn, direction: 'down' });
                finalBand = band;
                
                if (step < downTurns) {
                    await sleep(1618);
                }
            }
        }
        
        if (wave < repeats - 1) {
            await sleep(1000);
        }
    }
    
    // Final summary
    const totalTurns = allEntries.length;
    const totalTime = (totalTurns * 1.618).toFixed(1);
    const finalBandInfo = DIVINE_BANDS[finalBand];
    
    printLine(`\n🏆 DIVINE WAVE COMPLETE`, finalBand, finalBand === 'zeus');
    printLine(`   Turns: ${totalTurns} | Time: ${totalTime}s | Final Band: ${finalBandInfo.icon} ${finalBandInfo.name}`, finalBand);
    printLine(`   Final entry stored at ${finalBandInfo.freq} | ${finalBandInfo.light}\n`);
    
    // Re-enable input
    input.disabled = false;
    isPulsing = false;
    pulseStatus.innerHTML = '● idle';
    input.focus();
}

    if (!match) return 'Usage: add label: body';
    
    const label = match[1].trim();
    const body = match[2].trim();

    else if (wordCount <= 220) band = 'athena';
    else band = 'zeus';

    const frequency = getFrequencyForBand(band);
    
    const { error } = await db.from('terminal_entries').insert({
        label: label,
        body: body,
        word_count: wordCount,
        divine_band: band,
        frequency_hz: frequency,
        light_wavelength: bandInfo.light.toLowerCase().replace(' ', '_'),
        divine_icon: bandInfo.icon

commands.list = async (args) => {
    let page = 1;
    let limit = 15;
    
    if (args.length > 0 && !isNaN(parseInt(args[0]))) {
        page = parseInt(args[0]);
    }
    
    const offset = (page - 1) * limit;
    
    const { count, error: countError } = await db
        .from('terminal_entries')
        .select('*', { count: 'exact', head: true });
    
    if (countError) return `Error: ${countError.message}`;
    if (count === 0) return 'No entries found. Use "add label: body" or "pulse 7".';
    
    const totalPages = Math.ceil(count / limit);
    if (page > totalPages) return `Page ${page} doesn't exist. Total pages: ${totalPages}.`;
    
    const { data, error } = await db
        .from('terminal_entries')
        .select('*')
        .order('created_at', { ascending: false })
        .range(offset, offset + limit - 1);
    
    if (error) return `Error: ${error.message}`;
    
    let output = `📋 Page ${page}/${totalPages} (${count} total entries):\n\n`;
    
    for (let i = 0; i < data.length; i++) {
        const entry = data[i];
        const band = entry.divine_band || 'hermes';
        const bandInfo = DIVINE_BANDS[band];
        const freq = entry.frequency_hz || getFrequencyForBand(band);
        const num = offset + i + 1;
        const preview = entry.body.substring(0, 55) + (entry.body.length > 55 ? '...' : '');
        
        output += `${num}. ${bandInfo.icon} ${entry.label} [${freq.toFixed(1)}Hz | ${bandInfo.light}]\n   ${preview}\n\n`;
    }
    
    return output;
};

    if (!data || data.length === 0) return 'No entries found.';
    
    const random = data[Math.floor(Math.random() * data.length)];
    const band = random.divine_band || 'hermes';

};

commands.spectrum = async () => {
    const { data, error } = await db.from('terminal_entries').select('divine_band');
    if (error) return `Error: ${error.message}`;
    
    const counts = { hermes: 0, apollo: 0, hephaestus: 0, demeter: 0, poseidon: 0, athena: 0, zeus: 0 };
    for (const entry of data) {
        const band = entry.divine_band || 'hermes';
        if (counts[band] !== undefined) counts[band]++;
    }
    
    let output = `🌈 DIVINE SPECTRUM\n\n`;
    for (const [band, count] of Object.entries(counts)) {
        const info = DIVINE_BANDS[band];
        const barLength = Math.min(count, 30);
        const bar = '█'.repeat(barLength);
        const empty = '░'.repeat(30 - barLength);
        output += `${info.icon} ${info.name.padEnd(10)} ${info.freq.padEnd(8)} ${bar}${empty} ${count} entries\n`;
    }
    
    output += `\n📊 Total: ${data.length} entries classified across 7 divine bands.`;
    return output;
};

};

commands.search = async (args) => {

    const { data, error } = await db

        .select('*')

    if (error) return `Error: ${error.message}`;
    if (!data || data.length === 0) return `No matches found for "${searchTerm}"`;
    
    let output = `🔍 Found ${data.length} matches:\n\n`;
    for (const entry of data) {
        const band = entry.divine_band || 'hermes';
        const bandInfo = DIVINE_BANDS[band];
        const freq = entry.frequency_hz || getFrequencyForBand(band);
        output += `${bandInfo.icon} ${entry.label} [${freq.toFixed(1)}Hz] — ${entry.body.substring(0, 60)}${entry.body.length > 60 ? '...' : ''}\n`;
    }
    return output;
};

commands.weave = async (args) => {
    if (args.length === 0) return 'Usage: weave <label>';
    const label = args[0];
    
    try {
        const { data: entry, error: entryError } = await db
            .from('terminal_entries')
            .select('id, label')
            .eq('label', label)
            .single();
        
        if (entryError) return `Entry not found: ${label}`;
        
        const { data: rel, error: relError } = await db
            .from('terminal_relationships')
            .select('target_id, type')
            .eq('source_id', entry.id);
        
        if (relError) return `Error: ${relError.message}`;
        if (!rel || rel.length === 0) return `No connections found for "${label}".`;
        
        const targetIds = rel.map(r => r.target_id);
        const { data: targets, error: targetsError } = await db
            .from('terminal_entries')
            .select('label')
            .in('id', targetIds);
        
        if (targetsError) return `Error: ${targetsError.message}`;
        
        let output = `🔗 Connections from "${label}":\n`;
        for (let i = 0; i < targets.length; i++) {
            output += `  → ${targets[i].label} (${rel[i].type})\n`;
        }
        return output;
    } catch (err) {
        return `Error: ${err.message}`;
    }
};

commands.forgotten = async () => {
    try {
        const { data: entries, error: entriesError } = await db.from('terminal_entries').select('id, label, body, word_count');
        if (entriesError) return `Error: ${entriesError.message}`;
        if (!entries || entries.length === 0) return 'No entries found.';
        
        const { data: relations, error: relError } = await db.from('terminal_relationships').select('source_id');
        if (relError && !relError.message.includes('does not exist')) {
            return `Error checking relationships: ${relError.message}`;
        }
        
        const usedIds = new Set((relations || []).map(r => r.source_id));
        const forgotten = entries.filter(e => !usedIds.has(e.id));
        
        if (forgotten.length === 0) return 'No forgotten entries found. All entries have connections.';
        
        let output = `🌑 Forgotten Entries (${forgotten.length}):\n\n`;
        for (const entry of forgotten.slice(0, 20)) {
            const band = entry.divine_band || 'hermes';
            const bandInfo = DIVINE_BANDS[band];
            output += `${bandInfo.icon} ${entry.label} — ${entry.body.substring(0, 50)}${entry.body.length > 50 ? '...' : ''}\n`;
        }
        if (forgotten.length > 20) output += `\n... and ${forgotten.length - 20} more.`;
        return output;
    } catch (err) {
        return `Error: ${err.message}`;
    }
};

// ===============================
// PROCESS COMMAND
// ===============================
async function processCommand(input) {
    if (!input.trim()) return;
    if (isPulsing) {
        printLine('⚠️ Pulse in progress. Please wait for completion.');
        return;
    }
    
    // Check for add command
    if (input.toLowerCase().startsWith('add ')) {
        const result = await commands.add(null, input);
        if (result) printLine(result);
        return;
    }
    
    const parts = input.trim().split(/\s+/);
    const cmd = parts[0].toLowerCase();
    const args = parts.slice(1);
    
    if (!commands[cmd]) {
        printLine(`Unknown command: ${cmd}. Type 'help' for available commands.`);
        return;
    }
    
    try {
        const result = await commands[cmd](args, input);
        if (result) printLine(result);
    } catch (err) {
        printLine(`Error: ${err.message}`);
    }
}

window.addEventListener('DOMContentLoaded', async () => {
    const input = document.getElementById('command');
    
    if (!window.supabase) {
        printLine('ERROR: Supabase client not loaded');
        return;
    }
    
    db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    printLine('Kairos Terminal v3.0 — Divine Wave Pulse System');
    printLine('✓ Connected to Supabase');
    printLine('✓ 7 Divine Bands: Hermes (4Hz) → Apollo → Hephaestus → Demeter → Poseidon → Athena → Zeus (100Hz)');
    printLine('✓ Pulse system: Each turn = 1.618 seconds (φ)');
    printLine('');
    printLine('Try: pulse 7          — Full ascension to Zeus (11.3 seconds)');
    printLine('     pulse 7 2        — Wave up to Zeus, down to Apollo');
    printLine('     pulse 5 3        — Mountain up to Poseidon, down to Hermes');
    printLine('     pulse 7 7 3      — Three full waves (Trident)');
    printLine('');
    
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            const val = input.value;
            if (val.trim()) {
                printLine(`> ${val}`);
                processCommand(val);
                commandHistory.push(val);
                historyIndex = commandHistory.length;
            }
            input.value = '';
        }
        
        if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (historyIndex > 0) {
                historyIndex--;
                input.value = commandHistory[historyIndex];
            }
        }
        
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (historyIndex < commandHistory.length - 1) {
                historyIndex++;
                input.value = commandHistory[historyIndex];
            } else if (historyIndex === commandHistory.length - 1) {
                historyIndex++;
                input.value = '';
            }
        }
    });
    
    input.focus();
});
