<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>KairosDB · Terminal · Operator</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap');

        :root {
            --void:    #040608;
            --deep:    #060810;
            --surface: #0d1220;
            --border:  #141e2e;
            --mist:    #2a3a4e;
            --pale:    #c8d8e8;
            --dim:     #3a4e62;
            --gold:    #c8943a;
            --signal:  #d4b84a;

            /* God colors */
            --hermes:     #d4956a;
            --apollo:     #c9a84c;
            --hephaestus: #c07040;
            --demeter:    #6b8e23;
            --poseidon:   #2a7a9a;
            --athena:     #7a6a9a;
            --zeus:       #9a8ac0;
            --aphrodite:  #b05870;
            --ares:       #c0382a;
            --artemis:    #5a8050;
            --dionysus:   #8a4080;
            --hera:       #5a7aaa;

            --ok:   #27ae60;
            --warn: #d4a017;
            --err:  #c0392b;

            --font: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--void);
            font-family: var(--font);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .terminal {
            width: 100%;
            max-width: 900px;
            height: 94vh;
            min-height: 600px;
            background: var(--deep);
            border: 1px solid var(--border);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 80px rgba(0,0,0,0.9), 0 0 1px rgba(200,148,58,0.1);
        }

        /* ── HEADER ── */
        .t-header {
            background: var(--void);
            border-bottom: 1px solid var(--border);
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.4rem;
            flex-shrink: 0;
        }

        .t-badge {
            font-size: 0.6rem;
            letter-spacing: 3px;
            color: var(--gold);
            text-transform: uppercase;
        }

        .god-dots {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .god-dot {
            width: 7px;
            height: 7px;
            border-radius: 2px;
            opacity: 0.15;
            transition: opacity 0.3s, transform 0.3s, box-shadow 0.3s;
            cursor: default;
        }
        .god-dot.active  { opacity: 1; transform: scale(1.4); box-shadow: 0 0 8px currentColor; }
        .god-dot.ok      { opacity: 0.8; }
        .god-dot.warn    { opacity: 1; box-shadow: 0 0 6px var(--warn); }
        .god-dot.err     { opacity: 1; box-shadow: 0 0 6px var(--err); }

        .t-status {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.58rem;
            color: var(--dim);
        }

        .led {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--ok);
            box-shadow: 0 0 5px var(--ok);
            animation: pulse 2.5s infinite;
        }
        .led.busy   { background: var(--warn); box-shadow: 0 0 5px var(--warn); animation: none; }
        .led.error  { background: var(--err);  box-shadow: 0 0 5px var(--err);  animation: none; }
        @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

        .db-badge {
            font-size: 0.52rem;
            background: var(--surface);
            padding: 0.1rem 0.5rem;
            border-radius: 8px;
            color: var(--dim);
            border: 1px solid var(--border);
        }
        .db-badge.live { color: var(--ok); border-color: rgba(39,174,96,0.3); }

        /* ── DOMAIN BAR ── */
        .domain-bar {
            background: var(--void);
            border-bottom: 1px solid var(--border);
            padding: 0.35rem 1rem;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .domain-pill {
            font-size: 0.48rem;
            letter-spacing: 1px;
            padding: 0.15rem 0.5rem;
            border-radius: 10px;
            border: 1px solid transparent;
            color: var(--dim);
            transition: all 0.3s;
            cursor: default;
        }
        .domain-pill.loaded {
            opacity: 1;
            border-color: currentColor;
            opacity: 0.6;
        }
        .domain-pill.hungry {
            opacity: 1;
            border-color: currentColor;
            box-shadow: 0 0 6px currentColor;
            animation: hungerPulse 2s infinite;
        }
        @keyframes hungerPulse { 0%,100%{opacity:0.7} 50%{opacity:1} }

        /* ── OUTPUT ── */
        .t-output {
            flex: 1;
            overflow-y: auto;
            padding: 0.8rem 1rem;
            font-size: 0.76rem;
            line-height: 1.7;
            color: var(--pale);
            background: var(--deep);
            scroll-behavior: smooth;
        }
        .t-output::-webkit-scrollbar { width: 3px; }
        .t-output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .t-output div {
            white-space: pre-wrap;
            word-break: break-word;
            margin-bottom: 0.08rem;
            animation: lineIn 0.15s ease-out;
        }
        @keyframes lineIn { from{opacity:0;transform:translateX(-2px)} to{opacity:1;transform:translateX(0)} }

        /* Line styles */
        .l-sys    { color: var(--dim); }
        .l-dim    { color: var(--mist); }
        .l-ok     { color: var(--ok);   border-left: 2px solid var(--ok);   padding-left: 0.5rem; }
        .l-warn   { color: var(--warn); border-left: 2px solid var(--warn); padding-left: 0.5rem; }
        .l-err    { color: var(--err);  border-left: 2px solid var(--err);  padding-left: 0.5rem; }
        .l-gold   { color: var(--gold); }
        .l-signal { color: var(--signal); border-left: 2px solid var(--signal); padding-left: 0.5rem; }

        .l-hermes     { color: var(--hermes);     border-left: 2px solid var(--hermes);     padding-left: 0.5rem; }
        .l-apollo     { color: var(--apollo);     border-left: 2px solid var(--apollo);     padding-left: 0.5rem; }
        .l-hephaestus { color: var(--hephaestus); border-left: 2px solid var(--hephaestus); padding-left: 0.5rem; }
        .l-demeter    { color: var(--demeter);    border-left: 2px solid var(--demeter);    padding-left: 0.5rem; }
        .l-poseidon   { color: var(--poseidon);   border-left: 2px solid var(--poseidon);   padding-left: 0.5rem; }
        .l-athena     { color: var(--athena);     border-left: 2px solid var(--athena);     padding-left: 0.5rem; }
        .l-zeus       { color: var(--zeus);       border-left: 2px solid var(--zeus);       padding-left: 0.5rem; }
        .l-aphrodite  { color: var(--aphrodite);  border-left: 2px solid var(--aphrodite);  padding-left: 0.5rem; }
        .l-ares       { color: var(--ares);       border-left: 2px solid var(--ares);       padding-left: 0.5rem; }
        .l-artemis    { color: var(--artemis);    border-left: 2px solid var(--artemis);    padding-left: 0.5rem; }
        .l-dionysus   { color: var(--dionysus);   border-left: 2px solid var(--dionysus);   padding-left: 0.5rem; }
        .l-hera       { color: var(--hera);       border-left: 2px solid var(--hera);       padding-left: 0.5rem; }

        /* ── INPUT ── */
        .t-input-row {
            background: var(--void);
            border-top: 1px solid var(--border);
            padding: 0.55rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .t-prompt { color: var(--gold); font-weight: 700; font-size: 0.82rem; }

        #cmd {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--pale);
            font-family: var(--font);
            font-size: 0.78rem;
            outline: none;
            caret-color: var(--gold);
        }
        #cmd::placeholder { color: var(--mist); }

        /* ── FOOTER ── */
        .t-footer {
            background: var(--void);
            border-top: 1px solid var(--border);
            padding: 0.2rem 1rem;
            display: flex;
            justify-content: space-between;
            font-size: 0.5rem;
            color: var(--mist);
            flex-shrink: 0;
        }

        /* ── PIPELINE METER ── */
        .pipeline-row {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.62rem;
            color: var(--dim);
            padding: 0.2rem 0;
        }
        .p-bar-bg {
            flex: 1;
            height: 3px;
            background: var(--surface);
            border-radius: 2px;
            overflow: hidden;
        }
        .p-bar-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.5s ease;
        }

        @media (max-width: 600px) {
            .t-output { font-size: 0.68rem; padding: 0.6rem 0.8rem; }
            .t-input-row { padding: 0.45rem 0.8rem; }
        }
    </style>
</head>
<body>
<div class="terminal">

    <!-- HEADER -->
    <div class="t-header">
        <span class="t-badge">⚡ KairosDB · Terminal</span>
        <div class="god-dots" id="godDots">
            <div class="god-dot" style="color:var(--hermes);background:var(--hermes)"     title="hermes"></div>
            <div class="god-dot" style="color:var(--apollo);background:var(--apollo)"     title="apollo"></div>
            <div class="god-dot" style="color:var(--hephaestus);background:var(--hephaestus)" title="hephaestus"></div>
            <div class="god-dot" style="color:var(--demeter);background:var(--demeter)"   title="demeter"></div>
            <div class="god-dot" style="color:var(--poseidon);background:var(--poseidon)" title="poseidon"></div>
            <div class="god-dot" style="color:var(--athena);background:var(--athena)"     title="athena"></div>
            <div class="god-dot" style="color:var(--zeus);background:var(--zeus)"         title="zeus"></div>
            <div class="god-dot" style="color:var(--aphrodite);background:var(--aphrodite)" title="aphrodite"></div>
            <div class="god-dot" style="color:var(--ares);background:var(--ares)"         title="ares"></div>
            <div class="god-dot" style="color:var(--artemis);background:var(--artemis)"   title="artemis"></div>
            <div class="god-dot" style="color:var(--dionysus);background:var(--dionysus)" title="dionysus"></div>
            <div class="god-dot" style="color:var(--hera);background:var(--hera)"         title="hera"></div>
        </div>
        <div class="t-status">
            <div class="led" id="statusLed"></div>
            <span id="statusLabel">IDLE</span>
            <span class="db-badge" id="dbBadge">connecting…</span>
        </div>
    </div>

    <!-- DOMAIN BAR -->
    <div class="domain-bar" id="domainBar">
        <span class="domain-pill" style="color:var(--signal)"     data-domain="signal">⚡ signal —</span>
        <span class="domain-pill" style="color:var(--aphrodite)"  data-domain="love">💗 love —</span>
        <span class="domain-pill" style="color:var(--ares)"       data-domain="war">⚔️ war —</span>
        <span class="domain-pill" style="color:var(--apollo)"     data-domain="light">☀️ light —</span>
        <span class="domain-pill" style="color:var(--demeter)"    data-domain="farm">🌾 farm —</span>
        <span class="domain-pill" style="color:var(--hephaestus)" data-domain="forge">🔨 forge —</span>
        <span class="domain-pill" style="color:var(--hera)"       data-domain="crown">👑 crown —</span>
        <span class="domain-pill" style="color:var(--poseidon)"   data-domain="tide">🌊 tide —</span>
        <span class="domain-pill" style="color:var(--athena)"     data-domain="wisdom">🦉 wisdom —</span>
        <span class="domain-pill" style="color:var(--zeus)"       data-domain="storm">🌩️ storm —</span>
        <span class="domain-pill" style="color:var(--artemis)"    data-domain="wild">🏹 wild —</span>
        <span class="domain-pill" style="color:var(--dionysus)"   data-domain="vine">🍇 vine —</span>
    </div>

    <!-- OUTPUT -->
    <div id="output" class="t-output"></div>

    <!-- INPUT -->
    <div class="t-input-row">
        <span class="t-prompt">➜</span>
        <input type="text" id="cmd"
               placeholder="help · run hermes · status · tokens · pairs · prompts · images"
               autofocus spellcheck="false" autocomplete="off">
    </div>

    <!-- FOOTER -->
    <div class="t-footer">
        <span>tokens → pairs → svo_triplets → prompts → images · KairosDB v1</span>
        <span id="footerStats">—</span>
    </div>

</div>

<script>
// ════════════════════════════════════════════════════════════
// KAIROSDB TERMINAL · OPERATOR COCKPIT
// Reads: tokens, pairs, svo_triplets, prompts, images
// Triggers: all god edge functions via Supabase
// ════════════════════════════════════════════════════════════

const SB_URL  = 'https://kzcucjcyxybypncbdbws.supabase.co';
const SB_KEY  = 'sb_publishable_saeUHGocDah-T2_709M6Fg_g26JtLXw';
const EDGE    = `${SB_URL}/functions/v1`;

let db = null;
let cmdHistory = [], histIdx = -1;
let busy = false;

// ── GOD REGISTRY ──
const GODS = {
    hermes:     { icon:'⚡', color:'var(--hermes)',     edge:'hermes-extract',     domain:'signal',  desc:'Token courier · hunter/gatherer' },
    apollo:     { icon:'☀️', color:'var(--apollo)',     edge:'apollo-score',       domain:'light',   desc:'LLM gate · concept scorer' },
    hephaestus: { icon:'🔨', color:'var(--hephaestus)', edge:'hephaestus-forge',   domain:'forge',   desc:'SVO forger · sentence builder' },
    demeter:    { icon:'🌾', color:'var(--demeter)',    edge:'demeter-cultivate',  domain:'farm',    desc:'Pair cultivator · affinity scorer' },
    poseidon:   { icon:'🌊', color:'var(--poseidon)',   edge:'poseidon-flow',      domain:'tide',    desc:'Prompt synthesizer · flow weaver' },
    athena:     { icon:'🦉', color:'var(--athena)',     edge:'athena-audit',       domain:'wisdom',  desc:'Quality auditor · wisdom gate' },
    zeus:       { icon:'🌩️', color:'var(--zeus)',       edge:'zeus-complete',      domain:'storm',   desc:'Canonizer · final decree' },
    aphrodite:  { icon:'💗', color:'var(--aphrodite)',  edge:'aphrodite-pair',     domain:'love',    desc:'Pair weaver · attraction scorer' },
    ares:       { icon:'⚔️', color:'var(--ares)',       edge:'ares-stress',        domain:'war',     desc:'Stress tester · conflict engine' },
    artemis:    { icon:'🏹', color:'var(--artemis)',    edge:'artemis-hunt',       domain:'wild',    desc:'Domain hunter · wild tracker' },
    dionysus:   { icon:'🍇', color:'var(--dionysus)',   edge:'dionysus-release',   domain:'vine',    desc:'Chaos injector · creative disruptor' },
    hera:       { icon:'👑', color:'var(--hera)',       edge:'hera-curate',        domain:'crown',   desc:'Image curator · final crown' }
};

const DOMAINS = ['signal','love','war','light','farm','forge','crown','tide','wisdom','storm','wild','vine'];
const GOD_ORDER = Object.keys(GODS);

// ── PIPELINE TABLES ──
const PIPELINE = [
    { name:'tokens',      icon:'⚡', color:'var(--hermes)',  desc:'atomic concepts' },
    { name:'pairs',       icon:'💗', color:'var(--aphrodite)', desc:'token relationships' },
    { name:'svo_triplets',icon:'🔨', color:'var(--hephaestus)', desc:'mythogenic sentences' },
    { name:'prompts',     icon:'🌊', color:'var(--poseidon)', desc:'image prompt output' },
    { name:'images',      icon:'👑', color:'var(--hera)',    desc:'crowned images' }
];

// ── DOMAIN SEED SETS (for Hermes seeding) ──
const DOMAIN_SEEDS = {
    signal:  'message signal swift trade path word code travel cross courier speed threshold',
    love:    'love heart desire beauty grace tenderness embrace longing bloom devotion soul charm',
    war:     'battle strike clash blade shield rage force conquest enemy siege weapon army',
    wisdom:  'truth mind pattern knowledge logic reason insight clarity thought learning vision design',
    storm:   'thunder lightning decree command order rule wrath judgment authority law dominion sky',
    tide:    'ocean wave current depth flow sea flood salt surge abyss drift water',
    wild:    'hunt beast moon forest fang claw track chase instinct roam predator wilderness',
    vine:    'ecstasy dance madness release wine frenzy ritual trance abandon revelry intoxication chaos',
    forge:   'hammer fire anvil craft iron shape creation tool metal build smelt temper',
    farm:    'seed harvest soil grain crop cycle growth field earth cultivate season root',
    crown:   'legacy oath throne lineage memory law reign blood honor dynasty covenant stone',
    light:   'dawn harmony prophecy song balance golden lyre oracle radiance healing clarity truth'
};

// ── UTILITIES ──
function out(text, cls = null) {
    const el = document.getElementById('output');
    const div = document.createElement('div');
    div.textContent = text;
    if (cls) div.className = cls;
    el.appendChild(div);
    el.scrollTop = el.scrollHeight;
}

function sep(char = '─', len = 52) { out(char.repeat(len), 'l-dim'); }

function setStatus(state) {
    const led = document.getElementById('statusLed');
    const label = document.getElementById('statusLabel');
    led.className = 'led';
    if (state === 'busy') { led.classList.add('busy'); label.textContent = 'RUNNING'; busy = true; }
    else if (state === 'error') { led.classList.add('error'); label.textContent = 'ERROR'; busy = false; }
    else { label.textContent = 'IDLE'; busy = false; }
}

function dotForGod(name) {
    const idx = GOD_ORDER.indexOf(name);
    return document.querySelectorAll('.god-dot')[idx];
}

function setDot(name, state) {
    const dot = dotForGod(name);
    if (!dot) return;
    dot.className = 'god-dot';
    if (state) dot.classList.add(state);
}

function resetDots() {
    document.querySelectorAll('.god-dot').forEach(d => d.className = 'god-dot');
}

// ── EDGE FUNCTION CALLER ──
async function callEdge(fnName, payload) {
    const res = await fetch(`${EDGE}/${fnName}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error(`${fnName} returned ${res.status}`);
    return await res.json();
}

// ── DB STATS ──
async function getTableCount(table, filter = null) {
    let q = db.from(table).select('*', { count: 'exact', head: true });
    if (filter) q = q.eq(filter.col, filter.val);
    const { count } = await q;
    return count || 0;
}

async function getDomainCounts() {
    const counts = {};
    for (const domain of DOMAINS) {
        counts[domain] = await getTableCount('tokens', { col: 'domain', val: domain });
    }
    return counts;
}

async function updateDomainBar(counts) {
    const pills = document.querySelectorAll('.domain-pill');
    const max = Math.max(...Object.values(counts), 1);
    pills.forEach(pill => {
        const domain = pill.dataset.domain;
        const n = counts[domain] || 0;
        pill.textContent = pill.textContent.split(' ').slice(0, 2).join(' ') + ` ${n}`;
        pill.className = 'domain-pill';
        if (n === 0) pill.classList.add('hungry');
        else if (n < max * 0.3) pill.classList.add('hungry');
        else pill.classList.add('loaded');
    });
}

async function refreshStats() {
    try {
        const counts = await getDomainCounts();
        const total = Object.values(counts).reduce((a, b) => a + b, 0);
        updateDomainBar(counts);
        document.getElementById('footerStats').textContent =
            `tokens: ${total} · ${new Date().toLocaleTimeString()}`;
        document.getElementById('dbBadge').textContent = `db live ✓`;
        document.getElementById('dbBadge').className = 'db-badge live';
    } catch (e) {
        document.getElementById('dbBadge').textContent = `db err`;
    }
}

// ── COMMANDS ──
const CMDS = {

    help: async () => {
        out('');
        out('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'l-dim');
        out('  KAIROSDB TERMINAL · OPERATOR COMMANDS', 'l-gold');
        out('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'l-dim');
        out('');
        out('  GOD COMMANDS:', 'l-sys');
        out('  run <god>          — trigger a god\'s edge function', 'l-sys');
        out('  run hermes rss     — hermes RSS scrape cycle', 'l-sys');
        out('  run hermes pubmed  — hermes PubMed cycle', 'l-sys');
        out('  run hermes seed    — seed all 12 domains', 'l-sys');
        out('  run hermes all     — full hermes cycle', 'l-sys');
        out('  gods               — list all gods + status', 'l-sys');
        out('');
        out('  PIPELINE COMMANDS:', 'l-sys');
        out('  status             — full system status', 'l-sys');
        out('  tokens [domain]    — show recent tokens', 'l-sys');
        out('  tokens hunger      — show domain hunger map', 'l-sys');
        out('  pairs [n]          — show recent pairs', 'l-sys');
        out('  triplets [n]       — show recent SVO triplets', 'l-sys');
        out('  prompts [n]        — show recent prompts', 'l-sys');
        out('  images [n]         — show recent images', 'l-sys');
        out('  pipeline           — full pipeline flow counts', 'l-sys');
        out('');
        out('  SYSTEM:', 'l-sys');
        out('  clear · help · refresh', 'l-sys');
        out('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'l-dim');
        out('');
    },

    gods: async () => {
        out('');
        sep();
        out('  THE PANTHEON', 'l-gold');
        sep();
        for (const [name, g] of Object.entries(GODS)) {
            out(`  ${g.icon}  ${name.padEnd(12)} ${g.desc}`, `l-${name}`);
        }
        sep();
        out('');
    },

    status: async () => {
        out('');
        sep('═');
        out('  KAIROSDB · SYSTEM STATUS', 'l-gold');
        sep('═');

        // Pipeline counts
        out('  PIPELINE', 'l-sys');
        for (const table of PIPELINE) {
            setStatus('busy');
            try {
                const n = await getTableCount(table.name);
                const bar = '█'.repeat(Math.min(Math.floor(n / 5), 20)) + '░'.repeat(Math.max(0, 20 - Math.floor(n / 5)));
                out(`  ${table.icon}  ${table.name.padEnd(14)} ${String(n).padStart(5)}  ${bar}  ${table.desc}`, 'l-sys');
            } catch(e) {
                out(`  ${table.icon}  ${table.name.padEnd(14)} error`, 'l-err');
            }
        }
        out('');

        // Domain counts
        out('  DOMAIN HUNGER MAP', 'l-sys');
        const counts = await getDomainCounts();
        const max = Math.max(...Object.values(counts), 1);
        for (const [domain, n] of Object.entries(counts)) {
            const pct = Math.round((n / max) * 100);
            const bar = '█'.repeat(Math.floor(pct / 5)) + '░'.repeat(20 - Math.floor(pct / 5));
            const hunger = n < max * 0.3 ? ' ← HUNGRY' : '';
            out(`  ${domain.padEnd(10)} ${String(n).padStart(4)}  ${bar}${hunger}`, n < max * 0.3 ? 'l-warn' : 'l-sys');
        }

        sep('═');
        setStatus('idle');
        out('');
    },

    run: async (args) => {
        const godName = args[0]?.toLowerCase();
        const subCmd  = args[1]?.toLowerCase() || 'default';

        if (!godName) { out('usage: run <god> [subcommand]', 'l-warn'); return; }
        if (!GODS[godName]) { out(`unknown god: ${godName}. try: ${GOD_ORDER.join(', ')}`, 'l-err'); return; }

        const g = GODS[godName];
        setStatus('busy');
        setDot(godName, 'active');
        out('');
        out(`  ${g.icon} triggering ${godName} · ${g.edge}…`, `l-${godName}`);

        try {
            let payload = {};

            if (godName === 'hermes') {
                if (subCmd === 'seed') {
                    const allSeeds = Object.values(DOMAIN_SEEDS).join(' ');
                    payload = { text: allSeeds, source: 'seed' };
                    out('  seeding all 12 domains…', 'l-sys');
                } else if (subCmd === 'rss') {
                    payload = { action: 'scrape-all', feeds: ['bbc','aljazeera','hn','hn-algolia'], source: 'rss' };
                    out('  RSS scrape cycle…', 'l-sys');
                } else if (subCmd === 'pubmed') {
                    payload = {
                        action: 'scrape-all',
                        pubmed_queries: [
                            'neural network cognition','language model attention',
                            'consciousness neural correlates','knowledge graph ontology',
                            'cognitive architecture reasoning','artificial intelligence ethics'
                        ],
                        source: 'pubmed'
                    };
                    out('  PubMed cycle…', 'l-sys');
                } else if (subCmd === 'all' || subCmd === 'default') {
                    payload = {
                        action: 'scrape-all',
                        feeds: ['bbc','aljazeera','hn'],
                        pubmed_queries: ['neural network cognition','consciousness neural correlates','knowledge graph ontology'],
                        source: 'full-cycle'
                    };
                    out('  full cycle (RSS + PubMed)…', 'l-sys');
                } else {
                    // treat as raw text seed
                    payload = { text: args.slice(1).join(' '), source: 'direct' };
                    out(`  direct text: "${args.slice(1).join(' ')}"`, 'l-sys');
                }
            } else {
                // Generic god trigger — each god's edge handles its own logic
                payload = { source: 'terminal', trigger: subCmd };
            }

            const result = await callEdge(g.edge, payload);

            setDot(godName, 'ok');
            out(`  ✓ ${godName} complete`, 'l-ok');

            if (result.stored !== undefined)  out(`    tokens stored:   ${result.stored}`, 'l-sys');
            if (result.dropped !== undefined) out(`    tokens dropped:  ${result.dropped}`, 'l-dim');
            if (result.novel !== undefined)   out(`    novel words:     ${result.novel}`, 'l-sys');
            if (result.domains) {
                const domSummary = Object.entries(result.domains).map(([d,n]) => `${d}:${n}`).join(' · ');
                out(`    domains → ${domSummary}`, `l-${godName}`);
            }
            if (result.error) out(`    ⚠ ${result.error}`, 'l-warn');

            await refreshStats();

        } catch(e) {
            setDot(godName, 'err');
            out(`  ✗ ${godName} error: ${e.message}`, 'l-err');
        }

        setStatus('idle');
        out('');
    },

    tokens: async (args) => {
        const filter = args[0]?.toLowerCase();
        out('');

        if (filter === 'hunger') {
            out('  DOMAIN HUNGER MAP', 'l-gold');
            sep();
            const counts = await getDomainCounts();
            const max = Math.max(...Object.values(counts), 1);
            const sorted = Object.entries(counts).sort((a,b) => a[1] - b[1]);
            for (const [domain, n] of sorted) {
                const pct = Math.round((n / max) * 100);
                const bar = '█'.repeat(Math.floor(pct / 4)) + '░'.repeat(25 - Math.floor(pct / 4));
                const tag = n === 0 ? ' ◄ STARVING' : n < max * 0.3 ? ' ◄ hungry' : '';
                out(`  ${domain.padEnd(10)} ${String(n).padStart(4)}  ${bar}${tag}`,
                    n === 0 ? 'l-err' : n < max * 0.3 ? 'l-warn' : 'l-sys');
            }
            sep();
            out('  run hermes seed to feed hungry domains', 'l-dim');
            out('');
            return;
        }

        const limit = 15;
        let q = db.from('tokens').select('body,domain,word_type,score,source,created_at')
                   .order('created_at', { ascending: false }).limit(limit);
        if (filter && DOMAINS.includes(filter)) q = q.eq('domain', filter);

        const { data, error } = await q;
        if (error) { out(`error: ${error.message}`, 'l-err'); return; }
        if (!data?.length) { out('  no tokens found', 'l-dim'); return; }

        out(`  RECENT TOKENS${filter ? ' · ' + filter.toUpperCase() : ''}`, 'l-gold');
        sep();
        data.forEach(t => {
            out(`  ${t.body.padEnd(20)} ${t.domain.padEnd(10)} ${t.word_type}  score:${t.score}  ${t.source}`, `l-${t.domain === 'signal' ? 'hermes' : t.domain}`);
        });
        sep();
        out('');
    },

    pairs: async (args) => {
        const n = Math.min(parseInt(args[0]) || 8, 20);
        out('');
        const { data, error } = await db.from('pairs')
            .select('token_a_body,token_b_body,domain_a,domain_b,affinity_score,tension_score,pair_type')
            .order('created_at', { ascending: false }).limit(n);
        if (error) { out(`error: ${error.message}`, 'l-err'); return; }
        if (!data?.length) { out('  no pairs found', 'l-dim'); return; }
        out(`  RECENT PAIRS · ${data.length}`, 'l-gold');
        sep();
        data.forEach(p => {
            out(`  ${p.token_a_body.padEnd(14)} × ${p.token_b_body.padEnd(14)} ` +
                `affinity:${p.affinity_score?.toFixed(1) || '—'} ` +
                `tension:${p.tension_score?.toFixed(1) || '—'}  [${p.domain_a}×${p.domain_b}]`, 'l-aphrodite');
        });
        sep();
        out('');
    },

    triplets: async (args) => {
        const n = Math.min(parseInt(args[0]) || 6, 15);
        out('');
        const { data, error } = await db.from('svo_triplets')
            .select('subject,verb,object,archetypal_family,mythogenic_score,state')
            .order('created_at', { ascending: false }).limit(n);
        if (error) { out(`error: ${error.message}`, 'l-err'); return; }
        if (!data?.length) { out('  no triplets found', 'l-dim'); return; }
        out(`  RECENT SVO TRIPLETS · ${data.length}`, 'l-gold');
        sep();
        data.forEach(t => {
            out(`  ${t.subject.padEnd(12)} ${t.verb.padEnd(10)} ${t.object.padEnd(12)} ` +
                `[${t.archetypal_family || '—'}] myth:${t.mythogenic_score || 0}`, 'l-hephaestus');
        });
        sep();
        out('');
    },

    prompts: async (args) => {
        const n = Math.min(parseInt(args[0]) || 5, 10);
        out('');
        const { data, error } = await db.from('prompts')
            .select('prompt_text,telos,visual_mood,confidence,status,created_at')
            .order('created_at', { ascending: false }).limit(n);
        if (error) { out(`error: ${error.message}`, 'l-err'); return; }
        if (!data?.length) { out('  no prompts found', 'l-dim'); return; }
        out(`  RECENT PROMPTS · ${data.length}`, 'l-gold');
        sep();
        data.forEach((p, i) => {
            out(`  [${i+1}] ${p.status} · conf:${p.confidence?.toFixed(2) || '—'} · ${p.visual_mood || '—'}`, 'l-poseidon');
            out(`       ${p.prompt_text.substring(0, 80)}${p.prompt_text.length > 80 ? '…' : ''}`, 'l-sys');
        });
        sep();
        out('');
    },

    images: async (args) => {
        const n = Math.min(parseInt(args[0]) || 5, 10);
        out('');
        const { data, error } = await db.from('images')
            .select('prompt_text,style,score,crowned,status,created_at')
            .order('created_at', { ascending: false }).limit(n);
        if (error) { out(`error: ${error.message}`, 'l-err'); return; }
        if (!data?.length) { out('  no images found', 'l-dim'); return; }
        out(`  RECENT IMAGES · ${data.length}`, 'l-gold');
        sep();
        data.forEach((img, i) => {
            const crown = img.crowned ? ' 👑' : '';
            out(`  [${i+1}] score:${img.score} · ${img.status}${crown} · ${img.style || '—'}`, 'l-hera');
            out(`       ${(img.prompt_text || '—').substring(0, 80)}…`, 'l-sys');
        });
        sep();
        out('');
    },

    pipeline: async () => {
        out('');
        sep('═');
        out('  PIPELINE FLOW', 'l-gold');
        sep('═');
        let prev = null;
        for (const table of PIPELINE) {
            const n = await getTableCount(table.name);
            const pct = prev ? (prev > 0 ? Math.round((n / prev) * 100) : 0) : 100;
            const arrow = prev !== null ? `  ↓ ${pct}% flow-through` : '';
            if (arrow) out(arrow, 'l-dim');
            out(`  ${table.icon}  ${table.name.padEnd(14)} ${String(n).padStart(6)} records   ${table.desc}`, 'l-sys');
            prev = n;
        }
        sep('═');
        out('');
    },

    refresh: async () => {
        out('  refreshing…', 'l-sys');
        await refreshStats();
        out('  ✓ refreshed', 'l-ok');
    },

    clear: async () => {
        document.getElementById('output').innerHTML = '';
    }
};

// ── COMMAND PROCESSOR ──
async function processCmd(input) {
    if (!input.trim()) return;
    if (busy) { out('  terminal busy — wait for current operation', 'l-warn'); return; }

    const parts = input.trim().split(/\s+/);
    const cmd = parts[0].toLowerCase();
    const args = parts.slice(1);

    out(`➜ ${input}`, 'l-dim');

    if (CMDS[cmd]) {
        try {
            await CMDS[cmd](args, input);
        } catch(e) {
            out(`error: ${e.message}`, 'l-err');
            setStatus('error');
            setTimeout(() => setStatus('idle'), 2000);
        }
    } else {
        out(`  unknown command: ${cmd}`, 'l-warn');
        out('  type "help" for available commands', 'l-dim');
    }
}

// ── BOOT ──
window.addEventListener('DOMContentLoaded', async () => {
    const input = document.getElementById('cmd');

    if (!window.supabase) {
        out('ERROR: Supabase not loaded', 'l-err');
        return;
    }

    db = window.supabase.createClient(SB_URL, SB_KEY);

    // Boot sequence
    out('');
    out('  ⚡ KAIROSDB TERMINAL', 'l-gold');
    out('  operator cockpit · v1', 'l-dim');
    out('');
    out('  connecting to KairosDB…', 'l-sys');

    try {
        await refreshStats();
        out('  ✓ database connected', 'l-ok');
        out('  ✓ 12 domains mapped', 'l-ok');
        out('  ✓ pipeline tables: tokens · pairs · svo_triplets · prompts · images', 'l-ok');
    } catch(e) {
        out(`  ✗ connection failed: ${e.message}`, 'l-err');
    }

    out('');
    out('  type "help" for commands · "status" for system overview', 'l-dim');
    out('  type "run hermes seed" to feed all 12 domains', 'l-dim');
    out('');
    sep();
    out('');

    // Mark active dots for gods with deployed edges
    ['hermes','apollo','hephaestus'].forEach(g => setDot(g, 'ok'));

    // Auto-refresh every 60s
    setInterval(refreshStats, 60000);

    // Input handler
    input.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
            e.preventDefault();
            const val = input.value.trim();
            if (!val) return;
            cmdHistory.push(val);
            histIdx = cmdHistory.length;
            input.value = '';
            processCmd(val);
        }
        if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (histIdx > 0) { histIdx--; input.value = cmdHistory[histIdx]; }
        }
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (histIdx < cmdHistory.length - 1) { histIdx++; input.value = cmdHistory[histIdx]; }
            else { histIdx = cmdHistory.length; input.value = ''; }
        }
        // Tab autocomplete
        if (e.key === 'Tab') {
            e.preventDefault();
            const partial = input.value.toLowerCase();
            const allCmds = [...Object.keys(CMDS), ...Object.keys(GODS).map(g => `run ${g}`)];
            const match = allCmds.find(c => c.startsWith(partial) && c !== partial);
            if (match) input.value = match;
        }
    });

    input.focus();
});
</script>
