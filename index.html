<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kairos Terminal · MVP Kernel</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 20% 30%, #0a0c12, #030507);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
      padding: 1.5rem;
    }

    .kairos-terminal {
      background-color: #0b0e14;
      border: 1px solid #2a2f3f;
      border-radius: 12px;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.8);
      width: 100%;
      max-width: 1100px;
      height: 85vh;
      min-height: 520px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .terminal-header {
      padding: 0.9rem 1.4rem;
      background: #07090e;
      border-bottom: 1px solid #1e232e;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
    }

    .node-badge {
      color: #6c8b9f;
      font-weight: 500;
      text-transform: uppercase;
      font-size: 0.7rem;
      background: #10131c;
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
      border-left: 2px solid #3e6b8c;
    }

    .status-led {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #7c8ea0;
      font-size: 0.7rem;
    }

    .led {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: #2ecc71;
      box-shadow: 0 0 6px #2ecc71;
    }

    .terminal-output {
      flex: 1;
      overflow-y: auto;
      padding: 1.2rem;
      font-family: monospace;
      font-size: 0.9rem;
      line-height: 1.45;
      color: #d4e0ed;
      background: #0a0d14;
    }

    .terminal-output div {
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 0.25rem;
    }

    .input-line {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #06080e;
      border-top: 1px solid #1a1f2a;
      padding: 0.8rem 1.2rem;
    }

    .prompt-symbol {
      color: #7aa2c7;
      font-weight: 600;
    }

    #command {
      flex: 1;
      background: transparent;
      border: none;
      color: #eaf2ff;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.95rem;
      outline: none;
      padding: 0.3rem 0;
    }

    .footer-hint {
      background: #03050780;
      font-size: 0.65rem;
      text-align: center;
      padding: 0.35rem;
      color: #4b5e77;
      border-top: 1px solid #141a24;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="kairos-terminal">
  <div class="terminal-header">
    <div class="node-badge">
      <span>⚡ KERNEL NODE #1</span> <strong>· DEEPSEEK</strong>
    </div>
    <div class="status-led">
      <span class="led"></span>
      <span>supabase ready</span>
    </div>
  </div>

  <div id="terminal" class="terminal-output">
    <div>Kairos Terminal v1.0 - Initializing...</div>
  </div>

  <div class="input-line">
    <span class="prompt-symbol">➜</span>
    <input type="text" id="command" placeholder="type 'help' and press Enter" autofocus spellcheck="false" autocomplete="off">
  </div>
  <div class="footer-hint">
    commands: help, clear, schema, insert, query, random, forgotten
  </div>
</div>

<script>
  // ============================================================
  // KAIROS TERMINAL KERNEL
  // ============================================================
  
  // !!! REPLACE WITH YOUR SUPABASE CREDENTIALS !!!
  const SUPABASE_URL = 'https://kzcucjcyxybypncbdbws.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_saeUHGocDah-T2_709M6Fg_g26JtLXw';
  
  let supabase = null;
  const commands = {};
  
  function printToTerminal(text) {
    const terminalDiv = document.getElementById('terminal');
    if (!terminalDiv) return;
    const line = document.createElement('div');
    line.textContent = String(text);
    terminalDiv.appendChild(line);
    terminalDiv.scrollTop = terminalDiv.scrollHeight;
  }
  
  async function processCommand(cmdLine) {
    const trimmed = cmdLine.trim();
    if (trimmed === '') return;
    
    const parts = trimmed.split(/\s+/);
    const cmd = parts[0].toLowerCase();
    const args = parts.slice(1);
    
    if (commands[cmd]) {
      try {
        const output = await commands[cmd](args);
        if (output !== undefined && output !== null) {
          printToTerminal(String(output));
        }
      } catch (err) {
        printToTerminal(`Error: ${err.message}`);
      }
    } else {
      printToTerminal(`Unknown command: "${cmd}". Type "help" for available commands.`);
    }
  }
  
  // Command Handlers
  commands.help = async () => {
    return `Available commands:
  help        - Show this help message
  clear       - Clear terminal output
  schema      - List existing tables
  insert <tr> <json> - Insert row (e.g., insert entries {"label":"test","body":"hello"})
  query <tr> <filter> - Query table (e.g., query entries label=test)
  random      - Return random entry
  forgotten   - Show entries with no relationships`;
  };
  
  commands.clear = async () => {
    const terminalDiv = document.getElementById('terminal');
    if (terminalDiv) terminalDiv.innerHTML = '';
    return null;
  };
  
  commands.schema = async () => {
    const tables = ['entries', 'relationships', 'motifs'];
    let output = 'Database Schema:\n';
    
    for (const table of tables) {
      try {
        const { data, error } = await supabase.from(table).select('*').limit(1);
        if (error && error.message.includes('does not exist')) {
          output += `\n❌ ${table}: not found`;
        } else if (data && data.length > 0) {
          output += `\n✓ ${table}: ${Object.keys(data[0]).join(', ')}`;
        } else {
          output += `\n✓ ${table}: (empty)`;
        }
      } catch (err) {
        output += `\n❌ ${table}: error`;
      }
    }
    return output;
  };
  
  commands.insert = async (args) => {
    if (args.length < 2) return 'Usage: insert <table> <json>';
    
    const tableName = args[0];
    const jsonStr = args.slice(1).join(' ');
    
    try {
      const data = JSON.parse(jsonStr);
      const { error } = await supabase.from(tableName).insert(data);
      if (error) throw error;
      return `✓ Inserted into '${tableName}'`;
    } catch (err) {
      return `Insert error: ${err.message}`;
    }
  };
  
  commands.query = async (args) => {
    if (args.length < 1) return 'Usage: query </table> <filter>';
    
    const tableName = args[0];
    let query = supabase.from(tableName).select('*');
    
    if (args.length >= 2 && args[1].includes('=')) {
      const [key, value] = args[1].split('=');
      query = query.eq(key, value);
    }
    
    const { data, error } = await query;
    if (error) return `Query error: ${error.message}`;
    if (!data || data.length === 0) return 'No results';
    
    return data.map(row => JSON.stringify(row, null, 2)).join('\n');
  };
  
  commands.random = async () => {
    const { data, error } = await supabase.from('entries').select('*');
    if (error) return `Error: ${error.message}`;
    if (!data || data.length === 0) return 'No entries found';
    
    const random = data[Math.floor(Math.random() * data.length)];
    return `Random Entry:\n${JSON.stringify(random, null, 2)}`;
  };
  
  commands.forgotten = async () => {
    try {
      const { data: entries, error: entriesError } = await supabase.from('entries').select('id, label, body');
      if (entriesError) return `Error: ${entriesError.message}`;
      if (!entries || entries.length === 0) return 'No entries found';
      
      const { data: relations, error: relError } = await supabase.from('relationships').select('source_id');
      if (relError && !relError.message.includes('does not exist')) {
        return `Error: ${relError.message}`;
      }
      
      const usedIds = new Set((relations || []).map(r => r.source_id));
      const forgotten = entries.filter(e => !usedIds.has(e.id));
      
      if (forgotten.length === 0) return 'No forgotten entries';
      return `Forgotten (${forgotten.length}):\n${forgotten.map(e => `- ${e.label}`).join('\n')}`;
    } catch (err) {
      return `Error: ${err.message}`;
    }
  };
  
  // Initialize - DIRECT event binding
  window.addEventListener('DOMContentLoaded', async () => {
    const terminalDiv = document.getElementById('terminal');
    const commandInput = document.getElementById('command');
    
    if (!commandInput) {
      printToTerminal('ERROR: Could not find command input');
      return;
    }
    
    // Clear default text
    if (terminalDiv) {
      terminalDiv.innerHTML = '';
    }
    
    // Initialize Supabase
    if (!window.supabase) {
      printToTerminal('ERROR: Supabase client not loaded');
      return;
    }
    
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    printToTerminal('Kairos Terminal v1.0 - Connected');
    printToTerminal('Type "help" to begin\n');
    
    // DIRECT keypress handler - most reliable method
    commandInput.onkeypress = function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        const cmdLine = this.value;
        if (cmdLine.trim()) {
          printToTerminal(`> ${cmdLine}`);
          processCommand(cmdLine);
        }
        this.value = '';
      }
    };
    
    commandInput.focus();
  });
</script>
</body>
</html>
